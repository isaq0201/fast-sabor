<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central de Reclamações - Fast Sabor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#FFF8F0;
}

/* HEADER */

header{
background:#5F0F40;
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:700;
color:white;
}

nav{
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:500;
}

nav a:hover{
color:#FB8B24;
}

/* HERO */

.hero{
background:linear-gradient(
135deg,
#5F0F40,
#9A031E
);

padding:60px 5%;
color:white;
text-align:center;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
opacity:.9;
}

/* CONTEÚDO */

.container{
padding:40px 5%;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:25px;
}

.contador{
font-size:18px;
font-weight:600;
color:#9A031E;
}

#abrirFormulario{
width:60px;
height:60px;
border:none;
border-radius:50%;
background:#E36414;
color:white;
font-size:30px;
cursor:pointer;
transition:.3s;
}

#abrirFormulario:hover{
transform:scale(1.1);
}

#pesquisa{
width:100%;
padding:15px;
border:2px solid #eee;
border-radius:12px;
margin-bottom:25px;
font-size:15px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-content{
background:white;
width:100%;
max-width:600px;
padding:30px;
border-radius:20px;
}

.modal-content h2{
margin-bottom:20px;
color:#9A031E;
}

.modal-content input,
.modal-content textarea,
.modal-content select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

.modal-content textarea{
height:120px;
resize:none;
}

.modal-content button{
width:100%;
padding:14px;
border:none;
background:#E36414;
color:white;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card-topo{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.nome{
font-weight:700;
color:#9A031E;
}

.status{
background:#FFF4E8;
color:#E36414;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.card p{
margin:15px 0;
line-height:1.5;
}

.data{
font-size:12px;
color:gray;
margin-top:10px;
}

.excluir{
margin-top:15px;
width:100%;
padding:10px;
border:none;
background:#9A031E;
color:white;
border-radius:10px;
cursor:pointer;
}

@media(max-width:768px){

header{
justify-content:center;
gap:15px;
}

nav{
justify-content:center;
}

.hero h1{
font-size:30px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
🍔 Fast Sabor
</div>

<nav>
<a href="../index.html">Início</a>
<a href="../cardapio.html">Cardápio</a>
<a href="../promocoes.html">Promoções</a>
<a href="avaliacoes.html">Avaliações</a>
<a href="reclamacoes.html">Reclamações</a>
<a href="../sobre.html">Sobre</a>
<a href="contato.html">Contato</a>
</nav>

</header>

<section class="hero">

<h1>Central de Reclamações</h1>

<p>
Sua opinião é importante para melhorarmos nossos serviços.
</p>

</section>

<div class="container">

<div class="topo">

<div class="contador">
📢 Total de Reclamações:
<span id="total">0</span>
</div>

<button id="abrirFormulario">
+
</button>

</div>

<input
type="text"
id="pesquisa"
placeholder="🔍 Pesquisar reclamação..."
>

<div id="cards" class="cards"></div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-content">

<h2>Nova Reclamação</h2>

<input
type="text"
id="nome"
placeholder="Seu nome"
>

<textarea
id="texto"
placeholder="Descreva sua reclamação">
</textarea>

<select id="nota">
<option>⭐</option>
<option>⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐⭐</option>
</select>

<button onclick="criarReclamacao()">
Enviar Reclamação
</button>

</div>

</div>

<script>

const modal =
document.getElementById("modal");

const cards =
document.getElementById("cards");

let reclamacoes =
JSON.parse(localStorage.getItem("reclamacoes"))
|| [];

document
.getElementById("abrirFormulario")
.onclick = () =>
modal.style.display = "flex";

modal.onclick = e => {
if(e.target === modal){
modal.style.display = "none";
}
};

function salvar(){
localStorage.setItem(
"reclamacoes",
JSON.stringify(reclamacoes)
);
}

function atualizar(){

cards.innerHTML = "";

reclamacoes.forEach((item,index)=>{

cards.innerHTML += `

<div class="card">

<div class="card-topo">

<div class="nome">
${item.nome}
</div>

<div class="status">
Em análise
</div>

</div>

<div>
${item.nota}
</div>

<p>
${item.texto}
</p>

<div class="data">
${item.data}
</div>

<button
class="excluir"
onclick="excluir(${index})">
Excluir
</button>

</div>

`;

});

document.getElementById("total")
innerHTML = reclamacoes.length;

}

function criarReclamacao(){

const nome =
document.getElementById("nome").value;

const texto =
document.getElementById("texto").value;

const nota =
document.getElementById("nota").value;

if(nome === "" || texto === ""){
alert("Preencha todos os campos.");
return;
}

reclamacoes.unshift({

nome,
texto,
nota,

data:
new Date().toLocaleString('pt-BR')

});

salvar();
atualizar();

document.getElementById("nome").value="";
document.getElementById("texto").value="";

modal.style.display="none";

}

function excluir(index){

if(confirm("Deseja excluir esta reclamação?")){

reclamacoes.splice(index,1);

salvar();
atualizar();

}

}

document
.getElementById("pesquisa")
.addEventListener("keyup",function(){

const valor =
this.value.toLowerCase();

const cardsLista =
document.querySelectorAll(".card");

cardsLista.forEach(card=>{

const texto =
card.innerText.toLowerCase();

card.style.display =
texto.includes(valor)
? "block"
: "none";

});

});

atualizar();

</script>

</body>
</html>
