<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliações - Fast Sabor</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#FFF8F0;
}

/* HEADER */
header{
background:#5F0F40;
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
color:white;
font-size:28px;
font-weight:700;
}

nav{
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
}

nav a:hover{
color:#FB8B24;
}

/* HERO */
.hero{
background:linear-gradient(135deg,#5F0F40,#9A031E);
padding:60px 5%;
color:white;
text-align:center;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
opacity:.9;
}

/* CONTAINER */
.container{
padding:40px 5%;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:25px;
}

.estatisticas{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.box-info{
background:white;
padding:15px 20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
font-weight:600;
}

#abrirAvaliacao{
width:60px;
height:60px;
border:none;
border-radius:50%;
background:#E36414;
color:white;
font-size:30px;
cursor:pointer;
}

#pesquisa{
width:100%;
padding:15px;
border:2px solid #eee;
border-radius:12px;
margin-bottom:25px;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-content{
background:white;
width:100%;
max-width:600px;
padding:30px;
border-radius:20px;
}

.modal-content h2{
margin-bottom:20px;
color:#9A031E;
}

.modal-content input,
.modal-content textarea,
.modal-content select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

.modal-content textarea{
height:120px;
resize:none;
}

.modal-content button{
width:100%;
padding:14px;
background:#E36414;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.nome{
font-weight:700;
color:#9A031E;
}

.estrelas{
color:#FB8B24;
font-size:20px;
margin:10px 0;
}

.data{
font-size:12px;
color:gray;
margin-top:10px;
}

.excluir{
width:100%;
margin-top:15px;
padding:10px;
background:#9A031E;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

@media(max-width:768px){
header{
justify-content:center;
gap:15px;
}
nav{
justify-content:center;
}
.hero h1{
font-size:30px;
}
}

/* BOTÃO HAMBÚRGUER */
.btn-menu{
    display:none;
    flex-direction:column;
    justify-content:center;
    gap:5px;
    background:none;
    border:none;
    cursor:pointer;
    padding:6px;
    z-index:1100;
}
.btn-menu span{
    display:block;
    width:26px;
    height:3px;
    background:white;
    border-radius:3px;
    transition:.3s;
}
.btn-menu.aberto span:nth-child(1){ transform:translateY(8px) rotate(45deg); }
.btn-menu.aberto span:nth-child(2){ opacity:0; }
.btn-menu.aberto span:nth-child(3){ transform:translateY(-8px) rotate(-45deg); }
.menu-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    z-index:1050;
    backdrop-filter:blur(2px);
}
.menu-overlay.aberto{ display:block; }
.menu-drawer{
    position:fixed;
    top:0;
    right:0;
    width:75%;
    max-width:300px;
    height:100%;
    background:#5F0F40;
    z-index:1100;
    transform:translateX(100%);
    transition:transform .35s ease;
    padding:30px 24px;
    display:flex;
    flex-direction:column;
    gap:8px;
    box-shadow:-8px 0 30px rgba(0,0,0,.3);
}
.menu-drawer.aberto{ transform:translateX(0); }
.menu-drawer-logo{
    font-size:22px;
    font-weight:700;
    color:white;
    margin-bottom:24px;
    padding-bottom:16px;
    border-bottom:1px solid rgba(255,255,255,.2);
}
.menu-drawer a{
    color:white;
    text-decoration:none;
    font-size:16px;
    font-weight:500;
    padding:12px 16px;
    border-radius:12px;
    transition:.3s;
    display:block;
}
.menu-drawer a:hover{
    background:rgba(255,255,255,.15);
    color:#FB8B24;
    padding-left:22px;
}
@media(max-width:600px){
    nav{ display:none; }
    .btn-menu{ display:flex; }
    header{ justify-content:space-between !important; gap:0 !important; }
}


/* ── MENU HAMBÚRGUER MOBILE ──────────────────── */
.btn-menu {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    z-index: 1100;
}
.btn-menu span {
    display: block;
    width: 26px;
    height: 3px;
    background: white;
    border-radius: 3px;
    transition: .3s;
}
.btn-menu.aberto span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
.btn-menu.aberto span:nth-child(2) { opacity: 0; }
.btn-menu.aberto span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

.menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 1050;
    backdrop-filter: blur(2px);
}
.menu-overlay.aberto { display: block; }

.menu-drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 75%;
    max-width: 300px;
    height: 100%;
    background: #5F0F40;
    z-index: 1100;
    transform: translateX(100%);
    transition: transform .35s ease;
    padding: 30px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: -8px 0 30px rgba(0,0,0,.3);
}
.menu-drawer.aberto { transform: translateX(0); }

.menu-drawer-logo {
    font-size: 22px;
    font-weight: 700;
    color: white;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,.2);
}
.menu-drawer a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: 12px;
    transition: .3s;
    display: block;
}
.menu-drawer a:hover {
    background: rgba(255,255,255,.15);
    color: #FB8B24;
    padding-left: 22px;
}

@media(max-width: 600px) {
    nav { display: none !important; }
    .btn-menu { display: flex; }
    header {
        justify-content: space-between !important;
        align-items: center !important;
        flex-wrap: nowrap !important;
        gap: 0 !important;
    }
    .logo {
        white-space: nowrap;
    }
}

</style>
</head>

<body>

<header>
<div class="logo">🍔 Fast Sabor</div>
<button class="btn-menu" id="btnMenu" onclick="toggleMenu()">
    <span></span><span></span><span></span>
</button>
<nav>
<a href="../index.html">Início</a>
<a href="../cardapio.html">Cardápio</a>
<a href="../promocoes.html">Promoções</a>
<a href="avaliacoes.html">Avaliações</a>
<a href="reclamacoes.html">Reclamações</a>
<a href="../sobre.html">Sobre</a>
<a href="contato.html">Contato</a>
</nav>
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div class="menu-drawer" id="menuDrawer">
    <div class="menu-drawer-logo">🍔 Fast Sabor</div>
    <a href="../index.html">🏠 Início</a>
    <a href="../cardapio.html">🍔 Cardápio</a>
    <a href="../promocoes.html">🔥 Promoções</a>
    <a href="avaliacoes.html">⭐ Avaliações</a>
    <a href="reclamacoes.html">📢 Reclamações</a>
    <a href="../sobre.html">ℹ️ Sobre</a>
    <a href="contato.html">📍 Contato</a>
</div>
</header>

<section class="hero">
<h1>Avaliações dos Clientes</h1>
<p>Veja o que nossos clientes estão dizendo em tempo real.</p>
</section>

<div class="container">
<div class="topo">
<div class="estatisticas">
<div class="box-info">
⭐ Média: <span id="media">0.0</span>
</div>
<div class="box-info">
💬 Total: <span id="totalAvaliacoes">0</span>
</div>
</div>
<button id="abrirAvaliacao">+</button>
</div>

<input type="text" id="pesquisa" placeholder="🔍 Pesquisar avaliação...">
<div id="cardsAvaliacoes" class="cards"></div>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<h2>Nova Avaliação</h2>
<input type="text" id="nomeAvaliacao" placeholder="Seu nome">
<select id="estrelasAvaliacao">
<option value="1">⭐</option>
<option value="2">⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="5">⭐⭐⭐⭐⭐</option>
</select>
<textarea id="comentarioAvaliacao" placeholder="Conte sua experiência"></textarea>
<button id="btnEnviar">Enviar Avaliação</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBw8zjTcpZWvqkeFVF2qfRVXrV_z2jeh00",
  authDomain: "fast-sabor.firebaseapp.com",
  projectId: "fast-sabor",
  storageBucket: "fast-sabor.firebasestorage.app",
  messagingSenderId: "147800048742",
  appId: "1:147800048742:web:0d02a47d2f7352104999a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const modal = document.getElementById("modal");
const cards = document.getElementById("cardsAvaliacoes");

// Gerenciamento isolado do Modal (Abre/Fecha)
document.getElementById("abrirAvaliacao").onclick = () => {
    modal.style.display = "flex";
};

modal.onclick = e => {
    if(e.target === modal){ modal.style.display = "none"; }
};

// Escuta em tempo real o banco de dados do Firebase
const q = query(collection(db, "avaliacoes"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
    cards.innerHTML = "";
    let soma = 0;
    let total = snapshot.size;

    snapshot.forEach((documento) => {
        const item = documento.data();
        const id = documento.id;
        soma += Number(item.nota);

        cards.innerHTML += `
        <div class="card">
            <div class="nome">${item.nome}</div>
            <div class="estrelas">${"⭐".repeat(item.nota)}</div>
            <p>${item.comentario}</p>
            <div class="data">${item.data}</div>
            <button class="excluir" data-id="${id}">Excluir</button>
        </div>
        `;
    });

    document.getElementById("totalAvaliacoes").innerHTML = total;
    document.getElementById("media").innerHTML = total ? (soma / total).toFixed(1) : "0.0";

    // Mapeamento correto dos escutadores de exclusão
    document.querySelectorAll(".excluir").forEach(btn => {
        btn.onclick = async (e) => {
            if(confirm("Deseja excluir esta avaliação do banco de dados?")){
                const docId = e.target.getAttribute("data-id");
                await deleteDoc(doc(db, "avaliacoes", docId));
            }
        };
    });
});

// Envio do formulário gerenciado exclusivamente via EventListener
document.getElementById("btnEnviar").onclick = async () => {
    const nome = document.getElementById("nomeAvaliacao").value;
    const nota = document.getElementById("estrelasAvaliacao").value;
    const comentario = document.getElementById("comentarioAvaliacao").value;

    if(nome.trim() === "" || comentario.trim() === ""){
        alert("Preencha todos os campos.");
        return;
    }

    try {
        await addDoc(collection(db, "avaliacoes"), {
            nome,
            nota,
            comentario,
            data: new Date().toLocaleString('pt-BR'),
            timestamp: new Date().getTime()
        });

        document.getElementById("nomeAvaliacao").value = "";
        document.getElementById("comentarioAvaliacao").value = "";
        modal.style.display = "none";
    } catch (error) {
        alert("Erro ao salvar dados no Firebase. Verifique se as Regras de Segurança estão no Modo de Teste.");
        console.error(error);
    }
};

// Filtro de pesquisa local
document.getElementById("pesquisa").addEventListener("keyup", function(){
    const valor = this.value.toLowerCase();
    document.querySelectorAll(".card").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(valor) ? "block" : "none";
    });
});
</script>


<script>
function toggleMenu(){
    document.getElementById("btnMenu").classList.toggle("aberto");
    document.getElementById("menuDrawer").classList.toggle("aberto");
    document.getElementById("menuOverlay").classList.toggle("aberto");
}
</script>

</body>
</html>

}
